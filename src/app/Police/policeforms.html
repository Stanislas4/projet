<nav class="navbar">
  <div class="nav-brand">
    <h2>👮 Formulaire VBG - Police</h2>
  </div>
  <ul class="nav-menu">
    <li class="nav-item">
      <a (click)="logout()" class="logout-btn">Déconnexion</a>
    </li>
  </ul>
</nav>

<div class="form-container">
  <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

  <form [formGroup]="policeForm" (ngSubmit)="onSubmit()">
    <!-- Section 1: Informations personnelles -->
    <div class="form-section">

      <div class="form-row">
        <div class="form-group half">
          <label for="nomComplet">Nom et Prénoms *</label>
          <input type="text" id="nomComplet" formControlName="nomComplet" class="form-control"
            [class.is-invalid]="nomComplet?.invalid && nomComplet?.touched" placeholder="Entrez votre nom complet">
          <div class="error-message" *ngIf="nomComplet?.invalid && nomComplet?.touched">
            <span *ngIf="nomComplet?.errors?.['required']">Le nom est requis</span>
            <span *ngIf="nomComplet?.errors?.['minlength']">Minimum 2 caractères</span>
          </div>
        </div>

        <div class="form-group half">
          <label for="contact">Téléphone *</label>
          <input type="tel" id="contact" formControlName="contact" class="form-control"
            [class.is-invalid]="contact?.invalid && contact?.touched" placeholder="0123456789">
          <div class="error-message" *ngIf="contact?.invalid && contact?.touched">
            <span *ngIf="contact?.errors?.['required']">Le téléphone est requis</span>
            <span *ngIf="contact?.errors?.['pattern']">10 chiffres requis</span>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="domicile">Domicile *</label>
          <input type="text" id="domicile" formControlName="domicile" class="form-control"
            [class.is-invalid]="policeForm.get('domicile')?.invalid && policeForm.get('domicile')?.touched"
            placeholder="Adresse de résidence">
          <div class="error-message" *ngIf="policeForm.get('domicile')?.invalid && policeForm.get('domicile')?.touched">
            Le domicile est requis
          </div>
        </div>

        <div class="form-group half">
          <label for="numeroCarteIdentite">Numéro CNI</label>
          <input type="text" id="numeroCarteIdentite" formControlName="numeroCarteIdentite" class="form-control"
            [class.is-invalid]="policeForm.get('numeroCarteIdentite')?.invalid && policeForm.get('numeroCarteIdentite')?.touched"
            placeholder="CNI1234567890">
          <small class="hint">Format: CNI + 10 chiffres</small>
        </div>
      </div>

      <div class="form-group">
        <label for="photoCarteIdentite">Photo CNI</label>
        <input type="file" id="photoCarteIdentite" (change)="onFileSelected($event)" accept="image/*"
          class="form-control">
        <div *ngIf="selectedFile" class="file-info">
          📎 {{ selectedFile.name }}
        </div>
      </div>
    </div>

    <!-- Section 2: Informations judiciaires -->
    <div class="form-section">

      <div class="form-row">
        <div class="form-group half">
          <label for="dateDebutProcedure">Date de début de procédure *</label>
          <input type="datetime-local" id="dateDebutProcedure" formControlName="dateDebutProcedure" class="form-control"
            [class.is-invalid]="policeForm.get('dateDebutProcedure')?.invalid && policeForm.get('dateDebutProcedure')?.touched">
          <div class="error-message"
            *ngIf="policeForm.get('dateDebutProcedure')?.invalid && policeForm.get('dateDebutProcedure')?.touched">
            La date est requise
          </div>
        </div>

        <div class="form-group half">
          <label for="typeViolence">Type de violence *</label>
          <select id="typeViolence" formControlName="typeViolence" class="form-control"
            [class.is-invalid]="typeViolence?.invalid && typeViolence?.touched">
            <option value="">Sélectionnez</option>
            <option *ngFor="let option of typeViolenceOptions" [value]="option.value">
              {{ option.label }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="statutJudiciaire">Statut judiciaire</label>
          <select id="statutJudiciaire" formControlName="statutJudiciaire" class="form-control">
            <option value="">Sélectionnez</option>
            <option *ngFor="let option of statutJudiciaireOptions" [value]="option.value">
              {{ option.label }}
            </option>
          </select>
        </div>

        <div class="form-group half">
          <label for="auteur">Auteur présumé</label>
          <input type="text" id="auteur" formControlName="auteur" class="form-control"
            placeholder="Nom de l'auteur présumé">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="agentRecepteur">Agent récepteur *</label>
          <input type="text" id="agentRecepteur" formControlName="agentRecepteur" class="form-control"
            [class.is-invalid]="policeForm.get('agentRecepteur')?.invalid && policeForm.get('agentRecepteur')?.touched"
            placeholder="Nom de l'agent">
          <div class="error-message"
            *ngIf="policeForm.get('agentRecepteur')?.invalid && policeForm.get('agentRecepteur')?.touched">
            L'agent récepteur est requis
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="commentaire">Commentaire</label>
        <textarea id="commentaire" formControlName="commentaire" class="form-control" rows="4"
          placeholder="Détails de l'incident..."></textarea>
      </div>
    </div>

    <button type="submit" class="btn-submit" [disabled]="isLoading || policeForm.invalid">
      {{ isLoading ? '⏳ Envoi en cours...' : ' Enregistrer' }}
    </button>
  </form>
</div>
